<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Newsroom — Your morning briefing</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3ef;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:#fff;border-radius:12px;padding:48px;text-align:center;max-width:420px;border:1px solid #e0ddd5;}
    h1{font-family:Georgia,serif;font-style:italic;font-size:32px;margin-bottom:8px;}
    p{font-size:14px;color:#666;line-height:1.6;margin-bottom:24px;}
    .badge{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;background:#f0ede8;color:#888;letter-spacing:.5px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Newsroom</h1>
    <p>Your AI-powered morning briefing.<br/>Launching soon.</p>
    <div class="badge">Coming soon</div>
  </div>
</body>
</html>
