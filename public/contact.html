<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact, Headlines Report</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:wght@300;400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0f0e0c;--paper:#f7f4ee;--rule:#d4cfc4;--muted:#7a7567;--accent:#c1440e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;font-weight:300;max-width:600px;margin:0 auto;padding:48px 32px;}
.masthead{border-bottom:3px double var(--ink);padding-bottom:24px;margin-bottom:40px;text-align:center;}
.logo{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;}
.logo em{font-style:italic;font-weight:400;color:var(--accent);}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px;}
.date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:32px;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px;}
.contact-card{border:1.5px solid var(--rule);padding:24px;transition:border-color .15s;}
.contact-card:hover{border-color:var(--ink);}
.contact-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.contact-val{font-size:15px;font-weight:400;}
.contact-val a{color:var(--accent);text-decoration:none;}
.contact-val a:hover{text-decoration:underline;}
.form-group{margin-bottom:16px;}
label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
input,textarea,select{width:100%;padding:10px 14px;font-size:14px;font-family:'Source Serif 4',serif;border:1.5px solid var(--rule);background:white;color:var(--ink);outline:none;transition:border-color .15s;border-radius:2px;}
input:focus,textarea:focus{border-color:var(--ink);}
textarea{min-height:120px;resize:vertical;line-height:1.6;}
.submit-btn{padding:12px 28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;cursor:pointer;border-radius:2px;transition:background .15s;}
.submit-btn:hover{background:var(--accent);}
.success{display:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);padding:12px 0;letter-spacing:1px;}
footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--rule);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;justify-content:space-between;}
@media(max-width:500px){.contact-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="masthead"><div class="logo">Headlines<em>Report</em></div></div>
<h1>Contact Us</h1>
<div class="date">We usually respond within 24 hours</div>
<div class="contact-grid">
  <div class="contact-card">
    <div class="contact-label">General inquiries</div>
    <div class="contact-val"><a href="mailto:hello@headlinesreport.com">hello@headlinesreport.com</a></div>
  </div>
  <div class="contact-card">
    <div class="contact-label">Billing support</div>
    <div class="contact-val"><a href="mailto:hello@headlinesreport.com">hello@headlinesreport.com</a></div>
  </div>
</div>
<form onsubmit="handleSubmit(event)">
  <div class="form-group">
    <label>Your name</label>
    <input type="text" id="c-name" placeholder="First and last name" required/>
  </div>
  <div class="form-group">
    <label>Email address</label>
    <input type="email" id="c-email" placeholder="you@example.com" required/>
  </div>
  <div class="form-group">
    <label>Subject</label>
    <select id="c-subject">
      <option value="General question">General question</option>
      <option value="Billing issue">Billing issue</option>
      <option value="Bug report">Bug report</option>
      <option value="Feature request">Feature request</option>
      <option value="Press inquiry">Press inquiry</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="form-group">
    <label>Message</label>
    <textarea id="c-message" placeholder="How can we help?" required></textarea>
  </div>
  <button type="submit" class="submit-btn" id="c-btn">Send message</button>
  <div class="success" id="c-success">Message sent. We will be in touch soon.</div>
</form>
<footer>
  <span>Headlines Report</span>
  <span><a href="/" style="color:var(--muted);">Home</a> &nbsp;&middot;&nbsp; <a href="/app.html" style="color:var(--muted);">App</a></span>
</footer>
<script>
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('c-btn');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: 'hello@headlinesreport.com',
        subject: document.getElementById('c-subject').value + ' from ' + document.getElementById('c-name').value,
        html: '<p><strong>From:</strong> ' + document.getElementById('c-name').value + '</p>' +
              '<p><strong>Email:</strong> ' + document.getElementById('c-email').value + '</p>' +
              '<p><strong>Subject:</strong> ' + document.getElementById('c-subject').value + '</p>' +
              '<p><strong>Message:</strong></p><p>' + document.getElementById('c-message').value.replace(/
/g,'<br>') + '</p>'
      })
    });
    document.querySelector('form').style.display = 'none';
    document.getElementById('c-success').style.display = 'block';
  } catch(err) {
    btn.textContent = 'Error. Try emailing us directly.';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
